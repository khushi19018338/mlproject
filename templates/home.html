<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#eef2f7;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:550px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            outline:none;
        }

        input:focus,
        select:focus{
            border-color:#0d6efd;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            background:#0d6efd;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0b5ed7;
        }

        .prediction{
            margin-top:25px;
            padding:15px;
            background:#d1e7dd;
            color:#0f5132;
            border-radius:8px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🎓 Student Exam Performance Predictor</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="POST">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Race / Ethnicity</label>
            <select name="race_ethnicity" required>
                <option value="" disabled selected>Select Group</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education" required>
                <option value="" disabled selected>Select Education</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's Degree</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lunch</label>
            <select name="lunch" required>
                <option value="" disabled selected>Select Lunch Type</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free / Reduced</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test Preparation Course</label>
            <select name="test_preparation_course" required>
                <option value="" disabled selected>Select Option</option>
                <option value="completed">Completed</option>
                <option value="none">None</option>
            </select>
        </div>

        <div class="form-group">
            <label>Reading Score</label>
            <input
                type="number"
                name="reading_score"
                min="0"
                max="100"
                placeholder="Enter Reading Score"
                required
            >
        </div>

        <div class="form-group">
            <label>Writing Score</label>
            <input
                type="number"
                name="writing_score"
                min="0"
                max="100"
                placeholder="Enter Writing Score"
                required
            >
        </div>

        <button type="submit">
            Predict Maths Score
        </button>

    </form>

    {% if results %}
    <div class="prediction">
        Predicted Maths Score : {{ results[0] | round(2) }}
    </div>
    {% endif %}

</div>

</body>
</html>
